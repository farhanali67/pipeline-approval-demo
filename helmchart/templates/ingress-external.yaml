{{- if .Values.ingress.external.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.appName.name }}-ing
  namespace: {{ .Values.appName.namespace }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
  {{- with .Values.ingress.external.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
    alb.ingress.kubernetes.io/healthcheck-path: {{ default "/" $.Values.ingress.external.healthcheckPath | quote }}
  {{- end }}
spec:
  {{- with .Values.ingress.external.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.external.tls }}
  tls:
    {{- range .Values.ingress.external.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.external.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            {{- with .pathType }}
            pathType: {{ . }}
            {{- end }}
            backend:
              service:
                name: {{ printf "%s-svc" $.Values.appName.name }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
