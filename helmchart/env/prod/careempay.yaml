
app:
  name: app1-prod
  version: "1.0.0"
  description: "App 1 running in Dev environment"

replicaCount: 3

image:
  repository: nginx
  tag: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-prod.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http


nodeSelector: {}

tolerations: []

affinity: {}

# values.yaml

# ExternalSecret configuration - set enabled to false to skip creating the ExternalSecret
externalSecret:
  enabled: true  # <- set to false if this app doesn't need secrets from AWS
  name: demo-aws-secrets
  namespace: tapapps
  refreshInterval: 1h

  secretStoreRef:
    name: aws-parameterstore
    kind: SecretStore

  target:
    name: demo-secrets
    creationPolicy: Owner

  # List of secrets to sync from AWS Parameter Store
  data:
    - secretKey: ACCEPT_CARD_DEV_LIVE_KEY_CARD
      remoteRef:
        key: ACCEPT_CARD_DEV_LIVE_KEY_CARD
    - secretKey: PASSWD
      remoteRef:
        key: PASSWD
     
