name: Test Env Secret Objects

on:
 workflow_dispatch:
   inputs:
     has_env:
       default: "false"
     has_secret:
       default: "false"

jobs:
 test:
   runs-on: ubuntu-latest

   steps:

   - name: Simulate Logic
     run: |
       if [ "${{ github.event.inputs.has_env }}" = "true" ] || \
          [ "${{ github.event.inputs.has_secret }}" = "true" ]; then
         echo "SECRET_ENABLED=true" >> $GITHUB_ENV
       else
         echo "SECRET_ENABLED=false" >> $GITHUB_ENV
       fi

   - name: Output
     run: |
       echo "SECRET_ENABLED=$SECRET_ENABLED"
