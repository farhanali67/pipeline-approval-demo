name: Test Exact SECRET_ENABLED Expression

on:
  repository_dispatch:
    types: [secret-test]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Evaluate exact expression
        run: |
          echo "SECRET_ENABLED=${{ (github.event.client_payload.data.env || github.event.client_payload.data.secret) && 'true' || 'false' }}" >> $GITHUB_ENV

      - name: Print result
        run: |
          echo "SECRET_ENABLED=$SECRET_ENABLED"
