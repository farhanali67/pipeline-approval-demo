name: Approval Test

on:
  workflow_dispatch:

permissions:
  issues: write   # 🔥 REQUIRED

jobs:
  test-approval:
    runs-on: ubuntu-latest

    steps:
      - name: Start
        run: echo "Starting..."

      - name: Manual Approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: farhanali67   # ✅ your username
          minimum-approvals: 1
          issue-title: "Approve Test Pipeline"
          issue-body: "Approve to continue"

      - name: Done
        run: echo "Approved 🎉"
