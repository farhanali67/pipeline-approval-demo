name: Simple PR Pipeline

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  pr-flow:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN }}

      - name: Create branch & commit
        run: |
          BRANCH="test-pr-${{ github.run_id }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git checkout -b $BRANCH

          echo "Test change $(date)" >> test.txt

          git add test.txt
          git commit -m "Test PR commit"
          git push origin $BRANCH

          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Create PR
        id: create_pr
        env:
          GH_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --title "Test PR" \
            --body "Auto test PR" \
            --base main \
            --head $BRANCH)

          echo "PR_URL=$PR_URL"

          PR_NUMBER=$(echo "$PR_URL" | awk -F'/' '{print $NF}')
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Wait for PR merge
        env:
          GH_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          echo "⏳ Waiting for PR #$PR_NUMBER to be merged..."

          while true; do
            MERGED_AT=$(gh pr view $PR_NUMBER --json mergedAt -q .mergedAt)

            if [ "$MERGED_AT" != "null" ]; then
              echo "✅ PR merged at $MERGED_AT"
              break
            fi

            echo "⏱ Still waiting..."
            sleep 15
          done

      - name: Checkout merged code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN }}
          ref: main

      - name: Run test after merge
        run: |
          echo "🚀 Running tests after PR merge"
          cat test.txt || echo "File not found"
