name: Simple PR Pipeline

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  pr-flow:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create branch & commit
        run: |
          BRANCH="test-pr-${{ github.run_id }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git checkout -b $BRANCH

          echo "Test change $(date)" >> test.txt

          git add test.txt
          git commit -m "Test PR commit"
          git push origin $BRANCH

          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Create PR
        id: create_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --title "Test PR" \
            --body "Auto test PR" \
            --base main \
            --head $BRANCH)

          echo "PR_URL=$PR_URL"

          PR_NUMBER=$(echo "$PR_URL" | awk -F'/' '{print $NF}')
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV

      - name: Wait for PR merge
        run: |
          echo "Waiting for PR #$PR_NUMBER to be merged..."

          while true; do
            MERGED=$(gh pr view $PR_NUMBER --json merged -q .merged)

            if [ "$MERGED" = "true" ]; then
              echo "PR merged ✅"
              break
            fi

            echo "Still waiting..."
            sleep 15
          done

      - name: Run test after merge
        run: |
          echo "🚀 Running tests after PR merge"
          cat test.txt || echo "File not found"
