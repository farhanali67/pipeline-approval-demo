name: Simple PR Pipeline

on:
  workflow_dispatch:

jobs:
  pr-flow:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN }}

      - name: Create branch and commit test change
        run: |
          BRANCH="test-pr-${{ github.run_id }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git checkout -b "$BRANCH"

          echo "Test change $(date)" >> test.txt

          git add test.txt
          git commit -m "Test PR commit"
          git push origin "$BRANCH"

          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Create Pull Request
        id: create_pr
        env:
          GH_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --title "Test PR" \
            --body "Auto test PR" \
            --base main \
            --head "$BRANCH")

          echo "PR_URL=$PR_URL"

          PR_NUMBER=$(echo "$PR_URL" | awk -F'/' '{print $NF}')

          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Wait for PR merge
        env:
          GH_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          echo "Waiting for PR #$PR_NUMBER..."

          while true; do
            STATE=$(gh pr view "$PR_NUMBER" --json state --jq '.state')

            echo "state=$STATE"

            if [ "$STATE" = "MERGED" ]; then
              echo "PR merged ✅"
              break
            fi

            if [ "$STATE" = "CLOSED" ]; then
              echo "PR closed without merge ❌"
              exit 1
            fi

            echo "Still waiting..."
            sleep 15
          done

      - name: Checkout merged code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN }}
          ref: main

      - name: Run test after merge
        run: |
          echo "Running tests after PR merge"
          cat test.txt || echo "File not found"
